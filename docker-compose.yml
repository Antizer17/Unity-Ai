services:
  postgres:
    image: postgres:16-alpine
    container_name: unity-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: unity_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - unity_ai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d unity_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  unity_ai_postgres_data:
